<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Pjesmarica</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>


<body>


<header class="topbar">


<div class="logo">


<div class="logo-icon">
🎵
</div>


<div>

<h1>Upravljanje pjesmama</h1>

<p>Admin Pjesmarice</p>

</div>


</div>



<button
class="admin-button"
onclick="logout()">

🚪 Odjava

</button>


</header>






<main>



<!-- =====================
     DODAVANJE PJESME
===================== -->


<div class="song-page">


<h2 class="admin-title">
Dodaj novu pjesmu
</h2>



<label>
Naslov pjesme
</label>


<input
id="title"
class="admin-input"
placeholder="Naslov pjesme"
>




<label>
Izvođač
</label>


<input
id="artist"
class="admin-input"
placeholder="Izvođač"
list="artistList"
autocomplete="off"
>


<datalist id="artistList"></datalist>





<label>
Tekst pjesme
</label>


<textarea
id="lyrics"
class="admin-input admin-textarea"
placeholder="Tekst pjesme"
></textarea>




<button
class="save-button"
onclick="saveSong()">

💾 Spremi pjesmu

</button>




<button
class="cancel-button"
onclick="clearForm()">

🧹 Očisti

</button>




<p id="message"></p>


</div>









<!-- =====================
     PRETRAGA
===================== -->


<div class="song-page">


<h2 class="admin-title">
Sve pjesme
</h2>



<input
id="adminSearch"
class="admin-input"
placeholder="🔍 Traži pjesmu ili izvođača..."
>




<select
id="artistFilter"
class="admin-input">


<option value="">
🎤 Svi izvođači
</option>


</select>





<p
id="songCounter"
style="text-align:center;color:#9ca3af;">
0 pjesama
</p>





<div id="adminSongs"></div>





<!-- PAGINATION -->

<div
id="pagination"
style="text-align:center;margin-top:25px;">
</div>




</div>








<!-- =====================
     MODAL UREĐIVANJE
===================== -->


<div id="editModal">



<div class="song-page">



<h2 class="admin-title">
Uredi pjesmu
</h2>




<label>
Naslov
</label>


<input
id="editTitle"
class="admin-input"
>





<label>
Izvođač
</label>


<input
id="editArtist"
class="admin-input"
>





<label>
Tekst pjesme
</label>


<textarea
id="editLyrics"
class="admin-input admin-textarea">
</textarea>





<button
class="save-button"
onclick="updateSong()">

💾 Spremi izmjene

</button>





<button
class="cancel-button"
onclick="closeModal()">

❌ Zatvori

</button>



</div>


</div>







<script src="supabase.js"></script>

<script src="admin.js"></script>


</body>

</html>
