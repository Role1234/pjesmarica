<!DOCTYPE html>
<html lang="hr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<meta name="description" content="Administracija pjesmarice - dodavanje i uređivanje pjesama.">


<title>Admin - Pjesmarica</title>


<link rel="stylesheet" href="style.css">


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


</head>



<body>



<header class="topbar">


<div class="logo">


<div class="logo-icon">
🎵
</div>


<div>

<h1>Upravljanje pjesmama</h1>

<p>Admin Pjesmarice</p>

</div>


</div>



</header>





<main>



<div class="song-page">



<h2 class="admin-title">

Dodaj / Uredi pjesmu

</h2>





<input

id="songId"

type="hidden"

>







<label for="title">

Naslov pjesme

</label>



<input

id="title"

name="title"

class="admin-input"

type="text"

autocomplete="off"

required

placeholder="Naslov pjesme"

>







<label for="artist">

Izvođač

</label>



<input

id="artist"

name="artist"

class="admin-input"

type="text"

autocomplete="off"

required

placeholder="Izvođač"

>







<label for="lyrics">

Tekst pjesme

</label>



<textarea

id="lyrics"

name="lyrics"

class="admin-input admin-textarea"

required

placeholder="Tekst pjesme"

></textarea>







<button

type="button"

class="save-button"

onclick="saveSong()">

💾 Spremi pjesmu

</button>







<button

type="button"

class="cancel-button"

onclick="clearForm()">

🧹 Očisti

</button>







<button

type="button"

class="cancel-button"

onclick="logout()">

🚪 Odjava

</button>







<p id="message"></p>





</div>









<div class="song-page">



<h2 class="admin-title">

Sve pjesme

</h2>





<div id="adminSongs">

Učitavanje pjesama...

</div>





</div>







</main>







<script src="supabase.js"></script>

<script src="admin.js"></script>





</body>

</html>
